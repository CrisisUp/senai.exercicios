AWSTemplateFormatVersion: '2010-09-09'
Description: 'SkyCargo Serverless: Lambda Alert Handler with IAM Isolation'

# @file lambda-setup.yaml
# @brief Template IaC para provisionamento de funções serverless e roles.
# 
# Atividade 06 - Cloud Compute (Nível Arquiteto).
# 
# @author SENAI - Cristiano Batista Pessoa
# @date 22/04/2026
# 
# @section CloudMap Topologia Serverless
# - Resource 1: AWS::IAM::Role (Permissão mínima de execução).
# - Resource 2: AWS::Lambda::Function (Lógica Python encapsulada).
# - Runtime: Python 3.12.

Resources:
  # 1. ROLE DE EXECUÇÃO (SEGURANÇA ELITE)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # 2. A FUNÇÃO LAMBDA
  AlertFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SkyCargo-AlertProcessor-IaC
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              drone_id = event.get('DroneID', 'UNKNOWN')
              print(f"PROCESSANDO DRONE: {drone_id}")
              return {
                  'statusCode': 200,
                  'body': json.dumps({'status': 'ALERTA_RECEBIDO', 'drone': drone_id})
              }

Outputs:
  FunctionArn:
    Description: ARN da função Lambda provisionada.
    Value: !GetAtt AlertFunction.Arn
