<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trilogia Web - Atividade 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>SkyCargo Dashboard <span style="font-weight: 300;">v3.0</span></h1>
        <p>Clique em um módulo para selecioná-lo</p>
    </header>

    <!-- CONTAINER FLEXÍVEL -->
    <main class="dashboard-grid">
        
        <article class="module">
            <header><h3>Sinal GPS</h3></header>
            <div class="content">Sinal: <span class="val">Forte</span></div>
        </article>

        <article class="module">
            <header><h3>Clima</h3></header>
            <div class="content">Vento: <span class="val">12km/h</span></div>
        </article>

        <article class="module">
            <header><h3>Motores</h3></header>
            <div class="content">Temp: <span class="val">45°C</span></div>
        </article>

        <article class="module">
            <header><h3>Carga</h3></header>
            <div class="content">Peso: <span class="val">1.2t</span></div>
        </article>

    </main>

    <script src="script.js"></script>
</body>
</html>
