version: '3.8'

services:
  nexus-db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_USER: ${DB_USER}
    volumes:
      - db-persistence:/var/lib/mysql
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexus-backend:
    build: ./backend
    networks:
      - frontend-net
      - backend-net
    depends_on:
      nexus-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  nexus-frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  frontend-net:
  backend-net:

volumes:
  db-persistence:
